apiVersion: apps/v1
kind: Deployment
metadata:
  name: logs-demo-a
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logs-demo
      role: a
  template:
    metadata:
      labels:
        app: logs-demo
        role: a
    spec:
      containers:
        - name: logs-demo
          image: lunaship-logs-demo:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          env:
            - name: BIND_ADDR
              value: ":8080"
            - name: PROMETHEUS_LISTEN_ADDR
              value: ":9090"
            - name: TRACE_ENABLED
              value: "true"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-remote.test.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_SERVICE_NAME
              value: "logs-demo-a"
            - name: JAEGER_SAMPLER_TYPE
              value: "const"
            - name: JAEGER_SAMPLER_RATE
              value: "1"
            - name: SERVICE_ID
              value: "logs-demo-a"
            - name: LOG_FILE
              value: "/tmp/log.log"
            - name: ERR_FILE
              value: "/tmp/err.log"
            - name: MYSQL_HOST
              value: "192.168.0.120"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_PASSWORD
              value: "helloworld"
            - name: MYSQL_DATABASE
              value: "test"
            - name: REDIS_ADDR
              value: "192.168.0.120:6379"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: logs-demo-a
  namespace: test
  labels:
    app: logs-demo
    role: a
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "9090"
spec:
  selector:
    app: logs-demo
    role: a
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
---
