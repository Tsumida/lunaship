apiVersion: apps/v1
kind: Deployment
metadata:
  name: logs-demo-a
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logs-demo
      role: a
  template:
    metadata:
      labels:
        app: logs-demo
        role: a
    spec:
      containers:
        - name: logs-demo
          image: lunaship-logs-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: BIND_ADDR
              value: ":8080"
            - name: TRACE_ENABLED
              value: "true"
            - name: JAEGER_SAMPLER_TYPE
              value: "const"
            - name: JAEGER_SAMPLER_RATE
              value: "1"
            - name: JAEGER_SERVICE_NAME
              value: "logs-demo-a"
            - name: SERVICE_ID
              value: "logs-demo-a"
            - name: JAEGER_COLLECTOR_ENDPOINT
              value: "http://traefik.kube-system.svc.cluster.local/jaeger/api/traces"
            - name: LOG_FILE
              value: "/tmp/log.log"
            - name: ERR_FILE
              value: "/tmp/err.log"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: logs-demo-a
  namespace: test
spec:
  selector:
    app: logs-demo
    role: a
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
