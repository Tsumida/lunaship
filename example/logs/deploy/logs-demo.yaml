apiVersion: v1
kind: ConfigMap
metadata:
  name: logs-demo-app-config
  namespace: test
data:
  app.toml: |
    [app]
    app_name = "logs-demo"

    [app.log]
    level = "info"

    [app.trace]
    enabled = true
    otel_exporter_otlp_endpoint = "http://jaeger-remote.test.svc.cluster.local:4318"
    otel_exporter_otlp_protocol = "http"

    [app.pprof]
    enabled = true
    mode = "dynamic"

    [redis.default]
    addr = "192.168.0.120"
    port = 6379
    db = 0

    [mysql]
    max_open_conns = 200
    max_idle_conns = 100
    max_idle_time = "30s"

    [mysql.default]
    host = "192.168.0.120"
    port = 3306
    username = "root"
    password = "helloworld"
    database = "test"
    ping_enabled = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logs-demo-a
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logs-demo
      role: a
  template:
    metadata:
      labels:
        app: logs-demo
        role: a
    spec:
      containers:
        - name: logs-demo
          image: lunaship-logs-demo:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
            - name: pprof
              containerPort: 6060
          env:
            - name: BIND_ADDR
              value: ":8080"
            - name: PROMETHEUS_LISTEN_ADDR
              value: ":9090"
            - name: PPROF_LISTEN_ADDR
              value: ":6060"
            - name: SERVICE_ID
              value: "logs-demo-a"
            - name: LOG_FILE
              value: "/tmp/log.log"
            - name: ERR_FILE
              value: "/tmp/err.log"
          volumeMounts:
            - name: app-config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app-config
          configMap:
            name: logs-demo-app-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: logs-demo-a
  namespace: test
  labels:
    app: logs-demo
    role: a
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "9090"
spec:
  selector:
    app: logs-demo
    role: a
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
    - name: pprof
      port: 6060
      targetPort: 6060
---
