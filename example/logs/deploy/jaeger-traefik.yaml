apiVersion: v1
kind: Service
metadata:
  name: jaeger-remote
  namespace: test
  labels:
    app: jaeger-remote
spec:
  type: ClusterIP
  ports:
    - name: collector-http
      port: 14268
      targetPort: 14268
---
apiVersion: v1
kind: Endpoints
metadata:
  name: jaeger-remote
  namespace: test
  labels:
    app: jaeger-remote
subsets:
  - addresses:
      - ip: 192.168.0.120 # replace with the tinyinfra host IP running Jaeger
    ports:
      - name: collector-http
        port: 14268
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jaeger-collector-strip
  namespace: test
spec:
  stripPrefix:
    prefixes:
      - /jaeger
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jaeger-collector
  namespace: test
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/jaeger/api/traces`)
      kind: Rule
      middlewares:
        - name: jaeger-collector-strip
      services:
        - name: jaeger-remote
          port: 14268 
