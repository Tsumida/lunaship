syntax = "proto3";

package logs.v1;

option go_package = "github.com/tsumida/lunaship/example/logs/gen;logsv1";

// 
message PingRequest {
  string message = 1;
}

// 
message PingResponse {
  string message = 1;
  string trace_id = 2;
  string span_id = 3;
}

// 
message TransferRequest {
  string target_addr = 1 [json_name = "target"];
  string endpoint = 2;
  string request_json = 3 [json_name = "request_json"];
}

// 
message TransferResponse {
  string response_json = 1 [json_name = "response_json"];
}

// 
message GetSpotRequest {
  uint64 limit = 1;
  uint64 offset = 2;
}

// 
message Spot {
  uint64 id = 1;
  uint64 account_id = 2;
  string currency = 3;
  string deposit = 4;
  string frozen = 5;
  uint64 version = 6;
  uint64 create_time = 7;
  uint64 update_time = 8;
}

// 
message GetSpotResponse {
  repeated Spot spots = 1;
}

// 
service DummyService {
  // 
  rpc Ping(PingRequest) returns (PingResponse);

  // 
  rpc Transfer(TransferRequest) returns (TransferResponse);

  // 
  rpc GetSpot(GetSpotRequest) returns (GetSpotResponse);
}
